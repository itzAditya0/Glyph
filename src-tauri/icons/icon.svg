<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#0969da"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Stylized "G" pen nib -->
  <path d="M320 128 L176 272 L160 352 L240 336 L384 192 Z"
        fill="none" stroke="url(#accent)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Pen nib tip -->
  <path d="M160 352 L136 376"
        fill="none" stroke="#58a6ff" stroke-width="20" stroke-linecap="round"/>
  <!-- Markdown hash lines -->
  <line x1="256" y1="368" x2="376" y2="368" stroke="#8b949e" stroke-width="16" stroke-linecap="round"/>
  <line x1="256" y1="400" x2="344" y2="400" stroke="#6e7681" stroke-width="12" stroke-linecap="round"/>
</svg>
